<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create a new employee</title>
</head>
<body>
<h3>Welcome, Enter The Employee Details</h3>

<!--/*@thymesVar id="employee" type="org.example.springformtutorial.model.Employee"*/-->
<form method="POST" th:action="@{/employee/add-employee}" th:object="${employee}">
    <table>
        <tr>
            <td><label>Employee ID: </label></td>
            <td><input type="text" th:field="*{id}"/></td>
        </tr>
        <tr>
            <td><label>Employee's name: </label></td>
            <td><input type="text" th:field="*{name}"/></td>
        </tr>
        <tr>
            <td><label>Contact's number: </label></td>
            <td><input type="text" th:field="*{contactNumber}"/></td>
        </tr>
        <tr>
            <td><input type="submit" value="Submit"/></td>
        </tr>
    </table>
</form>
</body>
</html>
